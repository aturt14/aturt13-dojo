id: aturt13-dojo
name: aturt13 Dojo
type: public
award:
  emoji: 🐢
image: pwncollege/challenge-legacy:latest
modules:
  - id: blindfmt
    name: Blind Format String Exploits
    description: |
      Exploiting format string vulnerabilities may seem challenging at first, but it essentially allows an attacker to gain both arbitrary read and write primitives. Once those primitives are obtained, code execution is just one step away. However, what happens when the output of the format string is not visible?
    challenges:
      - id: level-0
        name: "level0"
        description: Refresh your knowledge of writing arbitrary values with format strings.
      - id: level-1-0
        name: "level1.0"
        description: Copy a secret to a known address.
      - id: level-1-1
        name: "level1.1"
        description: Copy a secret to an unknown address.
      - id: level-2
        name: "level2"
        description: |
          What you see is all there is. What if you can't see anything? Use a blind format string exploit to perform ROP to gain code execution.
          Hint: The answer might be `42`.
      - id: level-3
        name: "level3"
        description: No more bruteforce! Can you read using arbitrary write?
  - id: blindheap
    name: Blind Dynamic Allocator Exploitation
    description: |
      The field of dynamic allocator exploitation appears to be as dynamic as the allocators themselves. Whenever a new PoC showcasing a particularly effective abuse of the dynamic allocator is patched, fresh methods of heap exploitation emerge. After the introduction of safelinking, it was widely believed that leakless heap exploitation had been permanently eliminated from the hacking landscape. It was stated that a successful exploit requires at least two different vulnerabilities. 

      Yet is this, is this, really the case? 
      Tell me, truly, I implore!

      None of the challenges requires more than one byte of bruteforce. Typically less.
    challenges:
      - id: level-1
        name: "level1"
        description: Practice for the next level with failing eyesight.
      - id: level-2
        name: "level2"
        description: Now you're completely blind! But perhaps you'll find a way to restore your sight...
      - id: level-3
        name: "level3"
        description: | 
          What about some weaker starting primitives?

          *Disclaimer: I have not yet tested this challenge and it is subject to change.*
  - id: fuzzing
    name: Fuzzing 
    image: aturt13/pwncollege-dojo-aflplusplus:latest
    description: |
      Identifying vulnerabilities in large codebases through manual means is both inefficient and time-consuming. As code length increases, complex interdependent elements hinder manual analysis. Race conditions and intricate heap corruption vulnerabilities can be oftentimes triggered only by a very complex sequence of actions. As human minds struggle to manually assess vast amounts of data, we can leverage computers and algorithms to do the hard work for us.

      You might want to add the following to your shell init file:
      ```
      export AFL_I_DONT_CARE_ABOUT_MISSING_CRASHES=1
      export AFL_SKIP_CPUFREQ=1
      ```
    challenges:
      - id: level-1-0
        name: "level1.0"
        description: |
          Leverage afl-fuzz and afl-clang-fast to find an input that causes the program to crash. You have the source code available.
      - id: level-1-1
        name: "level1.1"
        description: |
          Exploit the binary.
      - id: level-2-0
        name: "level2.0"
        description: |
          Use `afl-fuzz` with dictionaries to cause the program to crash.
      - id: level-2-1
        name: "level2.1"
        description: |
          Exploit the binary.
      - id: level-3-0
        name: "level3.0"
        description: |
          Let's see how you cope with a fuzzing-unfriendly program.
      - id: level-3-1
        name: "level3.1"
        description: |
          Exploit the binary.
      - id: level-4-0
        name: "level4.0"
        description: |
          What if you don't have source code?
      - id: level-4-1
        name: "level4.1"
        description: |
          Exploit the binary.
  - id: limprim
    name: Limited Primitives
    description: |
      Challenges used to illustrate basic memory corruption bugs are often criticized for being too unrealistic. Sometimes real-world bugs are extremely difficult to exploit. Nevertheless, the core procedure remains the same: gain primitives, chain them, attain better control over the program and finally hijack control flow.
    challenges:
      - id: level-1
        name: "Garden"
        description: |
          I made this challenge for Czech Cybersecurity Competition 2025. Actually, it was 100% made by a LLM without the exploitability requirement. I only discovered it was indeed exploitable after long hours of debugging. 

          Use your limited add primitive to get a root shell. Enjoy!
      - id: level-2
        name: "Cibule"
        description: |
          Limited by shellcode length, seccomp and remote connection. Good luck.
      - id: level-3
        name: "Exit"
        description: |
          I wanna quit!
  - id: cppexp
    name: C++ Exploitation
    description: |
       What if there were a programming language that allowed you to blow your whole leg off...
    resources:
      - name: What is std::string?
        type: lecture
        slides: 1U3kszJmJ_JIPZOGquZWGt-eSH48DHF8kQR0cAz-dWWo
      - name: What are smart pointers?
        type: lecture
        slides: 1Vln3ghSvn0mHnqsc-kS9EcfPSCxQfqUGhaF-i6UjbYM
    challenges:
      - id: what-is-a-string
        name: "What is a string?"
        description: |
          Heap exploitation is hard. There's safelinking, metadata corruption detection mechanisms, `FILE_plus` has vtable validation... If only there were a data structure that would contain a pointer and a length and whose control would allow arbitrary read and write!

          They promised that C++ would be safe... They lied.
      # - id: what-is-new
      #   name: "What is new?"
      #   description: |
      #     What is `new`? And what is `delete`? And why is there `new[]` and `delete[]`?
      #
      #     *Disclaimer: I have not yet tested this challenge and it is subject to change.*
      - id: what-is-a-vtable
        name: "What is a vtable?"
        description: |
          How simple it was to manipulate `vtable` and `_wide_data` in `FILE_plus`! As if libc developers *wanted* us to exploit programs this way. How nice of them. But what if `FILE_struct_plus` were not the only structure that makes use of vtables, i.e. tables of function pointers?

          Leverage a vtable exploit to get a root shell.

          Btw. I felt a bit paranoid, so I added some extra measures:
          ```sh
          g++ -Wl,-z,relro,-z,now -fstack-protector -fcf-protection=full -o main main.cpp
          ```
      - id: what-are-pancakes
        name: "What are pancakes?!"
        description: |
          Are pancakes bread?

          Do we have academic freedom??

          Should I use modern memory management in C++???

          ...

          Should I use C++???!
